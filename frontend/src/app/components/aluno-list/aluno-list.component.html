<h2>Alunos</h2>

<a mat-raised-button color="primary" routerLink="/alunos/novo">
  <mat-icon>add</mat-icon>
  Novo Aluno
</a>

<table mat-table [dataSource]="dataSource" class="mat-elevation-z8 tabela-alunos">

  <ng-container matColumnDef="nome">
    <th mat-header-cell *matHeaderCellDef>Nome</th>
    <td mat-cell *matCellDef="let aluno">{{ aluno.nome }}</td>
  </ng-container>

  <ng-container matColumnDef="sexo">
    <th mat-header-cell *matHeaderCellDef>Sexo</th>
    <td mat-cell *matCellDef="let aluno">{{ aluno.sexo }}</td>
  </ng-container>

  <ng-container matColumnDef="dt_nasc">
    <th mat-header-cell *matHeaderCellDef>Data de Nascimento</th>
    <td mat-cell *matCellDef="let aluno">{{ aluno.dt_nasc | date:'dd/MM/yyyy' }}</td>
  </ng-container>

  <ng-container matColumnDef="acoes">
    <th mat-header-cell *matHeaderCellDef>Ações</th>
    <td mat-cell *matCellDef="let aluno">
      <a mat-icon-button color="primary" [routerLink]="['/alunos/editar', aluno.idaluno]" title="Editar">
        <mat-icon>edit</mat-icon>
      </a>

      <button mat-icon-button color="warn" type="button" (click)="excluir(aluno.idaluno)" title="Excluir">
        <mat-icon>delete</mat-icon>
      </button>
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="colunasExibidas"></tr>
  <tr mat-row *matRowDef="let row; columns: colunasExibidas;"></tr>
</table>

<p *ngIf="dataSource.data.length === 0">Nenhum aluno cadastrado.</p>
